# Advisory convenience only — CI is the gate (docs/dev/standards.md).
pre-commit:
  parallel: true
  jobs:
    - name: prettier
      glob: '*.{ts,tsx,js,cjs,json,md,yml,yaml}'
      run: npx prettier --check {staged_files}
    - name: eslint
      glob: '*.{ts,tsx}'
      run: npx eslint --max-warnings 0 {staged_files}
commit-msg:
  jobs:
    - name: commitlint
      run: npx commitlint --edit {1}
pre-push:
  jobs:
    - name: typecheck
      run: npm run typecheck
    - name: unit tests
      run: npm run test:unit

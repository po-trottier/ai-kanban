# CI gates in the order defined by docs/dev/testing.md. All actions SHA-pinned.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run depcruise
      - run: npm run knip
      - name: commitlint (PR commits)
        if: github.event_name == 'pull_request'
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to HEAD

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run setup
      - name: Unit + integration tests with coverage gates
        run: npm run test -- --coverage

  # testing.md CI step 4: build the production image and run the FULL integration suite
  # inside it — catches native-module drift (better-sqlite3/argon2 prebuilds differ between
  # Windows dev and Linux prod). The suite runs via `docker run` of the test stage (not
  # during `docker build`): a cached RUN layer would silently skip the tests, and a run
  # streams output + exit codes reliably. The runtime image then gets a smoke boot:
  # /healthz, /readyz, /version, and the break-glass CLI.
  docker-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Build the test stage (production build + dev deps)
        run: docker build --target test -t rivian-kanban-test .
      - name: Run the integration suite inside the image
        run: docker run --rm rivian-kanban-test
      - name: Build the runtime image (reuses the build-stage cache)
        run: |
          docker build -t rivian-kanban \
            --build-arg APP_VERSION="${GITHUB_REF_NAME}" \
            --build-arg GIT_SHA="${GITHUB_SHA}" \
            --build-arg BUILT_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)" .
      - name: Smoke-boot the runtime image
        run: |
          docker run -d --name app -p 3000:3000 -v rk-smoke-data:/data rivian-kanban
          for i in $(seq 1 30); do
            curl -fsS http://localhost:3000/readyz >/dev/null 2>&1 && break
            sleep 1
          done
          curl -fsS http://localhost:3000/healthz
          curl -fsS http://localhost:3000/readyz
          curl -fsS http://localhost:3000/version | grep -F "${GITHUB_SHA}"
          # Structural seed ran at boot; the break-glass CLI works in-image.
          docker exec app npm run cli -- users create-admin --email ci-smoke@example.com
          docker rm -f app
          docker volume rm rk-smoke-data

  # The e2e job stays on dev-mode source: rewiring it onto the production image needs an
  # explicit credential strategy because SEED_DEMO_PASSWORD is (deliberately) refused in
  # production mode. The docker-integration job above is the image gate in the meantime.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run setup
      - run: npx playwright install --with-deps chromium
      # The playwright config builds the SPA and boots the real server itself.
      - run: npm run test:e2e
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - name: gitleaks (pinned CLI, not the proprietary action)
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar -xz gitleaks
          ./gitleaks git --no-banner --redact .

  osv-scan:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        --lockfile=package-lock.json
      upload-sarif: false
    permissions:
      # The called workflow declares security-events: write at its top level; a caller must
      # grant at least what the callee declares or the run fails at startup validation —
      # even though upload-sarif=false means it is never used.
      contents: read
      actions: read
      security-events: write

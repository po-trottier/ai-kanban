# Single-node deployment (docs/architecture/deployment.md, ADR-020): one app
# container backed by a PostgreSQL container, one named volume each. The DEV
# server runs on SQLite (zero-setup single file); this Compose stack is the
# PRODUCTION posture and runs on Postgres — the app reads DATABASE_URL and
# never touches the SQLite path. TLS + client-IP handling live at the org
# reverse proxy in front (X-Forwarded-For + TRUST_PROXY_HOPS).
#
# Bootstrap (first deployment):
#   cp .env.example .env   # then set POSTGRES_PASSWORD, PUBLIC_BASE_URL,
#                          # TRUST_PROXY_HOPS, plus any Slack/summarizer secrets
#   docker compose up -d --build
#   docker compose exec app npm run cli -- users create-admin --email you@org.com
#
# Backups: use standard Postgres tooling against the postgres service, e.g.
#   docker compose exec postgres pg_dump -U rivian rivian > backup.sql
# (point-in-time recovery via WAL archiving is the production-grade upgrade).

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: rivian
      POSTGRES_DB: rivian
      # Required — set it in .env; the app's DATABASE_URL below reuses it.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rivian -d rivian']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-dev}
        GIT_SHA: ${GIT_SHA:-dev}
        BUILT_AT: ${BUILT_AT:-dev}
    image: rivian-kanban:latest
    restart: unless-stopped
    env_file:
      # Operator configuration only: secrets, PUBLIC_BASE_URL, TRUST_PROXY_HOPS,
      # POSTGRES_PASSWORD, Slack/summarizer settings.
      - path: .env
        required: false
    environment:
      # Non-negotiable image facts, re-pinned at the compose level because
      # `environment` overrides `env_file`. DATABASE_URL selects the Postgres
      # backend (ADR-020); the app ignores DATABASE_PATH while it is set.
      NODE_ENV: production
      DATABASE_URL: postgres://rivian:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/rivian
      BLOB_DIR: /data/blobs
      MIGRATIONS_DIR: /app/dist/migrations
      SPA_DIR: /app/web
    ports:
      # Public listener only. METRICS_PORT (9464) is deliberately NOT
      # published: the org Prometheus scrapes it over the internal network.
      - '3000:3000'
    volumes:
      - data:/data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  data:
